<!DOCTYPE html>
<html>

<head>

    <title>MV Tax Login</title>

    <style>

        body {

            margin: 0;

            padding: 0;

            font-family: Arial;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background: linear-gradient(
                135deg,
                #1e3c72,
                #2a5298
            );
        }

        .login-box {

            width: 350px;

            background: white;

            padding: 35px;

            border-radius: 12px;

            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        h2 {

            text-align: center;

            margin-bottom: 25px;

            color: #222;
        }

        input {

            width: 100%;

            padding: 14px;

            margin-top: 12px;

            border: 1px solid #ccc;

            border-radius: 6px;

            box-sizing: border-box;

            font-size: 15px;
        }

        button {

            width: 100%;

            padding: 14px;

            margin-top: 18px;

            border: none;

            background: #111;

            color: white;

            border-radius: 6px;

            cursor: pointer;

            font-size: 16px;
        }

        button:hover {
            background: #333;
        }

        .error {

            color: red;

            text-align: center;

            margin-top: 10px;
        }

        .brand {

            text-align: center;

            font-size: 30px;

            margin-bottom: 10px;
        }

        .subtitle {

            text-align: center;

            color: #666;

            margin-bottom: 20px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <div class="brand">
            🚗
        </div>

        <h2>MV Tax Admin</h2>

        <div class="subtitle">
            Secure Dashboard Login
        </div>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
